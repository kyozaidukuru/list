<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>My Projects</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f6f8;
      margin: 0;
      padding: 20px;
    }

    h2 {
      margin-top: 40px;
    }

    .section {
      margin-bottom: 40px;
    }

    .card {
      display: flex;
      gap: 16px;
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-top: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      transition: transform 0.15s;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .thumb {
      width: 120px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      background: #ddd;
    }

    .content {
      flex: 1;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      color: #0366d6;
      text-decoration: none;
    }

    .title:hover {
      text-decoration: underline;
    }

    .desc {
      margin-top: 6px;
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
<body>

<h1>My Projects</h1>

<div id="app"></div>

<script>
const data = [
  {
    category: "ひらがな",
    items: [
      {
        title: "ひらがな",
        url: "https://example.github.io/kanji",
        desc: "漢字を組み合わせて熟語を作る教材",
        thumb: "thumb1.png"
      },
      {
        title: "ひらがな練習",
        url: "https://example.github.io/hiragana",
        desc: "低学年向けのひらがな学習ツール",
        thumb: "thumb2.png"
      }
    ]
  },
  {
    category: "ゲーム系",
    items: [
      {
        title: "計算ゲーム",
        url: "https://example.github.io/calc",
        desc: "計算力を鍛えるミニゲーム",
        thumb: "thumb3.png"
      }
    ]
  },
  {
    category: "その他",
    items: [
      {
        title: "タイピング練習",
        url: "https://example.github.io/typing",
        desc: "タイピング速度向上ツール",
        thumb: "thumb4.png"
      },
      {
        title: "メモアプリ",
        url: "https://example.github.io/memo",
        desc: "シンプルなブラウザメモ帳",
        thumb: "thumb5.png"
      }
    ]
  }
];

const app = document.getElementById("app");

data.forEach(section => {
  const sectionDiv = document.createElement("div");
  sectionDiv.className = "section";

  const title = document.createElement("h2");
  title.textContent = section.category;
  sectionDiv.appendChild(title);

  section.items.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    const img = document.createElement("img");
    img.className = "thumb";
    img.src = item.thumb;
    card.appendChild(img);

    const content = document.createElement("div");
    content.className = "content";

    const link = document.createElement("a");
    link.href = item.url;
    link.textContent = item.title;
    link.className = "title";
    link.target = "_blank";

    const desc = document.createElement("div");
    desc.className = "desc";
    desc.textContent = item.desc;

    content.appendChild(link);
    content.appendChild(desc);
    card.appendChild(content);

    sectionDiv.appendChild(card);
  });

  app.appendChild(sectionDiv);
});
</script>

</body>
</html>
